name: ECR Access Check

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Check AWS identity
        run: aws sts get-caller-identity

      - name: List ECR images
        run: |
          aws ecr describe-repositories --repository-names leadpoet/sourcing-model 2>&1 || echo "Cannot access repo"
          echo "---"
          aws ecr list-images --repository-name leadpoet/sourcing-model --max-items 10 2>&1 || echo "Cannot list images"
